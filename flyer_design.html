<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elberg Prototyping - Flyer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="flyer_style.css">
</head>
<body>
    <div class="page">
        <!-- Background Elements for Style -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <header>
            <div class="logo">
                <span class="logo-bold">ELBERG</span><span class="logo-light">PROTOTYPING</span>
            </div>
            <h1 class="hero-title">BUILD. <span class="gradient-text">MEASURE.</span> LEARN.</h1>
        </header>

        <main>
            <div class="main-content glass-card">
                <div class="value-prop">
                    <h2>What you get:</h2>
                    <ul>
                        <li>Functional MVP in a week</li>
                        <li>Only pay for materials</li>
                    </ul>
                </div>

                <div class="cta-section">
                    <div class="cta-text">
                        <p class="interested">Interested?</p>
                        <p class="meeting">Non binding meeting &rarr;</p>
                    </div>
                    <div class="qr-container">
                        <img src="flyer_qr.png" alt="QR Code" class="main-qr">
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <div class="rip-off-tabs">
                <!-- 8 Tabs -->
                <div class="tab"><div class="tab-content"><img src="flyer_qr.png" class="small-qr"><span>Free MVP Sprint</span></div></div>
                <div class="tab"><div class="tab-content"><img src="flyer_qr.png" class="small-qr"><span>Free MVP Sprint</span></div></div>
                <div class="tab"><div class="tab-content"><img src="flyer_qr.png" class="small-qr"><span>Free MVP Sprint</span></div></div>
                <div class="tab"><div class="tab-content"><img src="flyer_qr.png" class="small-qr"><span>Free MVP Sprint</span></div></div>
                <div class="tab"><div class="tab-content"><img src="flyer_qr.png" class="small-qr"><span>Free MVP Sprint</span></div></div>
                <div class="tab"><div class="tab-content"><img src="flyer_qr.png" class="small-qr"><span>Free MVP Sprint</span></div></div>
                <div class="tab"><div class="tab-content"><img src="flyer_qr.png" class="small-qr"><span>Free MVP Sprint</span></div></div>
                <div class="tab"><div class="tab-content"><img src="flyer_qr.png" class="small-qr"><span>Free MVP Sprint</span></div></div>
            </div>
        </footer>
    </div>
</body>
</html>
